<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#c0392b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ごっちリスト">
<title>からあげ！ごっち チェックリスト</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0a00;font-family:'Noto Sans JP',system-ui,sans-serif;color:#fff;overscroll-behavior:none}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5}
select option{background:#1a0a00}
button{font-family:inherit}
@keyframes fp{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
#hd{background:linear-gradient(135deg,#c0392b,#e74c3c 40%,#f39c12);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(231,76,60,.6)}
#hi{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
#lg{display:flex;align-items:center;gap:8px}
#fl{font-size:28px}
#lt{font-size:20px;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.4);line-height:1.1}
#ls{font-size:10px;opacity:.85;letter-spacing:1px}
#pw{height:6px;background:rgba(0,0,0,.3)}
#pf{height:100%;background:#fff;transition:width .5s;border-radius:0 3px 3px 0;width:0}
#hr{text-align:right}
#pp{font-size:22px;font-weight:900}
#pc{font-size:10px;opacity:.8}
#nv{display:flex;background:#2d0e00;border-bottom:2px solid #c0392b}
.nb{flex:1;padding:12px 8px;background:transparent;border:none;color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer}
.nb.on{background:#c0392b;color:#fff}
.ct{padding:16px;max-width:600px;margin:0 auto}
#es{display:flex;align-items:center;gap:8px;margin-bottom:16px;background:#2d0e00;border-radius:12px;padding:12px;border:1px solid rgba(192,57,43,.27)}
#ev{flex:1;background:transparent;border:none;color:#fff;font-size:15px;font-weight:700;outline:none;cursor:pointer;font-family:inherit;min-width:0}
.rb{background:#2d0e00;border:1px solid #c0392b;color:#c0392b;border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer;font-size:11px;white-space:nowrap}
#sr{display:flex;gap:8px;margin-bottom:16px}
.sc{flex:1;border-radius:12px;padding:10px;text-align:center}
.sn{font-size:24px;font-weight:900;line-height:1}
.sl{font-size:10px;opacity:.7;margin-top:2px;font-weight:600;letter-spacing:.5px}
#sb{display:flex;justify-content:flex-end;margin-bottom:10px}
.smb{background:transparent;border:1px solid rgba(243,156,18,.53);color:#f39c12;border-radius:8px;padding:6px 12px;font-weight:800;cursor:pointer;font-size:11px;white-space:nowrap}
.smb.on{background:#f39c12;color:#1a0a00}
.cb{background:#2d0e00;border-radius:16px;margin-bottom:12px;border:1px solid rgba(192,57,43,.2);overflow:hidden}
.cb.sm{border-color:rgba(243,156,18,.4)}
.ch{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:linear-gradient(90deg,rgba(192,57,43,.13),transparent);border-bottom:1px solid rgba(192,57,43,.13)}
.cn{font-size:14px;font-weight:800}
.cs{font-size:11px;opacity:.6;margin-top:2px}
.ca{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ib{background:transparent;border:none;color:#ff6b6b;cursor:pointer;font-size:18px;padding:2px 6px}
.ib.cf{background:#e74c3c;color:#fff;border-radius:8px;font-size:11px;font-weight:900;padding:7px 9px;white-space:nowrap}
.dc{display:flex;align-items:center;gap:4px;flex-shrink:0}
.dc button{border:none;border-radius:8px;padding:7px 9px;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap}
.dr{background:#e74c3c;color:#fff}
.dk{background:#34495e;color:#fff}
.sa{border-radius:6px;width:30px;height:30px;font-size:13px;font-weight:900;cursor:pointer;border:1px solid #f39c12;background:#3d1500;color:#f39c12;display:inline-flex;align-items:center;justify-content:center}
.sa:disabled{border-color:#444;background:transparent;color:#444;cursor:default}
.ir{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.ir.ck{background:rgba(46,204,113,.08)}
.bx{width:22px;height:22px;border-radius:6px;border:2px solid #c0392b;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;font-weight:900}
.bx.ck{border-color:#2ecc71;background:#2ecc71}
.nm{flex:1;font-size:14px;font-weight:600;cursor:pointer;word-break:break-word;min-width:0}
.nm.ck{text-decoration:line-through;opacity:.5}
.qc{display:flex;align-items:center;gap:4px;background:rgba(26,10,0,.33);border-radius:8px;padding:2px;flex-shrink:0}
.qb{background:#c0392b;border:none;color:#fff;width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:16px;font-weight:900;display:inline-flex;align-items:center;justify-content:center}
.qn{font-size:13px;font-weight:800;min-width:26px;text-align:center;color:#f39c12}
.db{background:transparent;border:none;color:#ff6b6b;cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0}
.db.cf{background:#e74c3c;color:#fff;border-radius:8px;font-size:11px;font-weight:900;padding:7px 8px;white-space:nowrap}
.aib{width:100%;padding:10px;background:transparent;border:1px dashed rgba(192,57,43,.33);border-radius:0 0 12px 12px;color:#c0392b;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px}
.acb{width:100%;padding:14px;background:transparent;border:2px dashed rgba(192,57,43,.33);border-radius:16px;color:#c0392b;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-bottom:12px}
.ar{display:flex;flex-wrap:wrap;gap:8px;padding:10px 14px;background:#1a0a00;border-top:1px solid rgba(192,57,43,.13)}
.ti{background:#2d0e00;border:1px solid rgba(192,57,43,.33);border-radius:8px;color:#fff;padding:8px 12px;font-size:13px;outline:none;font-family:inherit}
.qi{width:56px;flex-shrink:0;background:#2d0e00;border:1px solid rgba(192,57,43,.33);border-radius:8px;color:#f39c12;padding:8px;font-size:13px;outline:none;text-align:center;font-weight:800;font-family:inherit}
.ok{flex-shrink:0;background:#c0392b;border:none;color:#fff;border-radius:8px;padding:8px 14px;font-weight:800;cursor:pointer;font-size:13px}
.ng{flex-shrink:0;background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:8px 10px;font-weight:700;cursor:pointer;font-size:13px}
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:200;padding:20px}
#mo.show{display:flex}
#mb{background:#2d0e00;border:2px solid #c0392b;border-radius:20px;padding:24px;width:100%;max-width:360px}
.mt{font-size:16px;font-weight:900;margin-bottom:16px;color:#f39c12}
.ec{background:#2d0e00;border:1px solid rgba(192,57,43,.2);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.ec.on{border:2px solid #e74c3c}
.esb{background:#2d0e00;border:1px solid #c0392b;color:#fff;border-radius:8px;padding:6px 12px;font-weight:700;cursor:pointer;font-size:12px;flex-shrink:0}
.esb.on{background:#c0392b}
.fb{background:#2d0e00;border:1px solid rgba(192,57,43,.2);border-radius:16px;padding:16px;margin-bottom:12px}
.ft{font-size:14px;font-weight:800;color:#f39c12;margin-bottom:12px}
.fl2{font-size:11px;color:#f39c12;font-weight:700;margin-bottom:6px;letter-spacing:.5px;display:block}
.fi{width:100%;background:#1a0a00;border:1px solid rgba(192,57,43,.33);border-radius:8px;color:#fff;padding:8px 12px;font-size:13px;outline:none;font-family:inherit;margin-bottom:8px;display:block}
.fb2{width:100%;background:#c0392b;border:none;color:#fff;border-radius:10px;padding:12px;font-weight:800;cursor:pointer;font-size:14px}
.emp{text-align:center;padding:40px 20px;opacity:.5}
.stl{font-size:16px;font-weight:900;color:#f39c12;margin-bottom:16px}
</style>
</head>
<body>
<div id="app">
<div id="hd">
  <div id="hi">
    <div id="lg"><span id="fl">🔥</span><div><div id="lt">からあげ！ごっち</div><div id="ls">EVENT CHECKLIST</div></div></div>
    <div id="hr"><div id="pp">0%</div><div id="pc">0/0</div></div>
  </div>
  <div id="pw"><div id="pf"></div></div>
</div>
<div id="nv">
  <button class="nb on" id="n0" type="button" onclick="sw('c')">📋 チェックリスト</button>
  <button class="nb" id="n1" type="button" onclick="sw('e')">📅 イベント</button>
</div>

<div id="vc" class="ct">
  <div id="es">
    <span style="font-size:20px">📍</span>
    <select id="ev" onchange="onSel(this.value)"></select>
    <button class="rb" type="button" onclick="doReset()">↺ リセット</button>
  </div>
  <div id="sr">
    <div class="sc" style="background:rgba(231,76,60,.13);border:1px solid rgba(231,76,60,.33)"><div class="sn" style="color:#e74c3c" id="s0">0</div><div class="sl">TOTAL</div></div>
    <div class="sc" style="background:rgba(46,204,113,.13);border:1px solid rgba(46,204,113,.33)"><div class="sn" style="color:#2ecc71" id="s1">0</div><div class="sl">CHECKED</div></div>
    <div class="sc" style="background:rgba(243,156,18,.13);border:1px solid rgba(243,156,18,.33)"><div class="sn" style="color:#f39c12" id="s2">0</div><div class="sl">REMAINING</div></div>
  </div>
  <div id="sb" style="display:none"><button class="smb" id="smb" type="button" onclick="togSort()">⇅ カテゴリ並び替え</button></div>
  <div id="cc"></div>
  <button class="acb" id="acb" type="button" onclick="showAC()">＋ カテゴリを追加</button>
  <div id="acf" style="display:none" class="fb">
    <div class="ft">新しいカテゴリ</div>
    <div style="display:flex;gap:8px">
      <input class="ti" style="flex:1" id="ncn" placeholder="例: 🧃 ドリンク類">
      <button class="ok" type="button" onclick="doAddCat()">追加</button>
      <button class="ng" type="button" onclick="hideAC()">✕</button>
    </div>
  </div>
</div>

<div id="ve" class="ct" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div class="stl" style="margin-bottom:0">📅 イベント管理</div>
    <button onclick="hardReset()" type="button" style="background:transparent;border:1px solid #555;color:#888;border-radius:8px;padding:5px 10px;font-size:10px;cursor:pointer">🔄 初期化</button>
  </div>
  <div id="el"></div>
  <div class="fb">
    <div class="ft">＋ 新しいイベントを追加</div>
    <input class="fi" id="nen" placeholder="イベント名（例: 夏祭り2026）">
    <input class="fi" id="ned" type="date">
    <div style="margin-bottom:12px">
      <label class="fl2">📋 荷物リストを流用する（任意）</label>
      <select class="fi" id="cfs" onchange="onCFC()">
        <option value="">― 空のリストで始める ―</option>
      </select>
      <div id="ch" style="display:none;font-size:11px;opacity:.6;margin-top:4px">✓ チェックはすべてリセットされます</div>
    </div>
    <button class="fb2" id="aeb" type="button" onclick="doAddEv()">イベントを追加</button>
  </div>
</div>

<div id="mo" onclick="closeMo()">
  <div id="mb" onclick="event.stopPropagation()">
    <div class="mt">✏️ アイテムを編集</div>
    <input class="fi" id="ein">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <span style="font-size:13px;opacity:.7">数量</span>
      <input class="qi" id="eiq" type="number" min="0" style="flex:1;width:auto">
    </div>
    <div style="display:flex;gap:8px">
      <button class="ok" style="flex:1;padding:12px" type="button" onclick="saveMo()">保存</button>
      <button class="ng" style="flex:1;padding:12px" type="button" onclick="closeMo()">キャンセル</button>
    </div>
  </div>
</div>
</div>

<script>
var EVS = [];
var AID = null;
var SORT = false;
var ECID = null;
var EIID = null;
var ACID = null;
var PDC = null;
var PDI = null;

var DEF = [{
  id:"ev1", name:"デフォルト", date:"",
  categories:[
    {id:"c5",name:"⛺ ファサード",items:[
      {id:"a1",name:"横断幕",qty:1,checked:false},
      {id:"a2",name:"腰巻き",qty:1,checked:false},
      {id:"a3",name:"のぼり",qty:2,checked:false},
      {id:"a4",name:"物干し竿",qty:1,checked:false},
      {id:"a5",name:"LED照明",qty:2,checked:false}
    ]},
    {id:"c3",name:"📦 備品・消耗品",items:[
      {id:"b1",name:"ラミパック30",qty:1,checked:false},
      {id:"b2",name:"ラミパック40",qty:1,checked:false},
      {id:"b3",name:"レジ袋S",qty:1,checked:false},
      {id:"b4",name:"レジ袋M",qty:1,checked:false},
      {id:"b5",name:"ゴミ袋45L",qty:1,checked:false},
      {id:"b6",name:"ポリグローブ",qty:1,checked:false},
      {id:"b7",name:"ゴム手袋",qty:1,checked:false},
      {id:"b8",name:"ラップ",qty:1,checked:false},
      {id:"b9",name:"ペーパータオル",qty:1,checked:false}
    ]},
    {id:"c4",name:"💰 販売・会計",items:[
      {id:"d1",name:"釣銭50,000円",qty:1,checked:false},
      {id:"d2",name:"レジ端末",qty:1,checked:false},
      {id:"d3",name:"メニュー表",qty:1,checked:false},
      {id:"d4",name:"各種POP",qty:1,checked:false}
    ]},
    {id:"c1",name:"🍳 調理器具",items:[
      {id:"e1",name:"フライヤー23L",qty:1,checked:false},
      {id:"e2",name:"フライヤーはね",qty:1,checked:false},
      {id:"e3",name:"揚げザル",qty:1,checked:false},
      {id:"e4",name:"カス用ザル小",qty:1,checked:false},
      {id:"e5",name:"揚げ用トング",qty:1,checked:false},
      {id:"e6",name:"粉用番重",qty:1,checked:false},
      {id:"e7",name:"粉用ザル",qty:1,checked:false},
      {id:"e8",name:"揚げ用ボウル",qty:1,checked:false},
      {id:"e9",name:"粉ふるいザル",qty:1,checked:false},
      {id:"e10",name:"バット",qty:1,checked:false},
      {id:"e11",name:"ボウル",qty:1,checked:false},
      {id:"e12",name:"唐揚げ用トング",qty:1,checked:false},
      {id:"e13",name:"その他",qty:1,checked:false}
    ]},
    {id:"c2",name:"🐔 食材",items:[
      {id:"f1",name:"鶏むね肉",qty:1,checked:false},
      {id:"f2",name:"ぼんじり",qty:1,checked:false},
      {id:"f3",name:"むねトロ",qty:1,checked:false},
      {id:"f4",name:"岩塩",qty:1,checked:false},
      {id:"f5",name:"マヨ",qty:1,checked:false},
      {id:"f6",name:"片栗粉",qty:1,checked:false},
      {id:"f7",name:"油",qty:1,checked:false},
      {id:"f8",name:"その他",qty:1,checked:false}
    ]}
  ]
}];

function gid(){ return "x" + Math.random().toString(36).slice(2, 11); }
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function trimText(s){ return String(s || "").trim(); }

function load(){
  var s = null;
  try { s = localStorage.getItem("gc3") || localStorage.getItem("gotchi-v2") || localStorage.getItem("gotchi-events"); } catch(e){}
  if(s){
    try {
      var p = JSON.parse(s);
      if(Array.isArray(p) && p.length > 0){ EVS = p; AID = EVS[0].id; return; }
    } catch(e){}
  }
  EVS = JSON.parse(JSON.stringify(DEF));
  AID = EVS[0].id;
  save();
}
function save(){ try { localStorage.setItem("gc3", JSON.stringify(EVS)); } catch(e){} }
function getEv(){ return EVS.find(function(e){ return e.id === AID; }) || null; }

function render(){ rHead(); rSel(); rCats(); rEvList(); rCopySel(); }

function rHead(){
  var ev = getEv();
  var tot = 0, chk = 0;
  if(ev){
    ev.categories.forEach(function(c){
      c.items.forEach(function(it){ tot++; if(it.checked) chk++; });
    });
  }
  var pct = tot === 0 ? 0 : Math.round(chk / tot * 100);
  document.getElementById("pp").textContent = pct + "%";
  document.getElementById("pc").textContent = chk + "/" + tot;
  document.getElementById("pf").style.width = pct + "%";
  document.getElementById("s0").textContent = tot;
  document.getElementById("s1").textContent = chk;
  document.getElementById("s2").textContent = tot - chk;
}

function rSel(){
  var sel = document.getElementById("ev");
  sel.innerHTML = EVS.map(function(e){
    return `<option value="${esc(e.id)}"${e.id === AID ? " selected" : ""}>${esc(e.name)}${e.date ? "  " + esc(e.date) : ""}</option>`;
  }).join("");
  var ev = getEv();
  document.getElementById("sb").style.display = ev && ev.categories.length > 1 ? "flex" : "none";
}

function rCats(){
  var cc = document.getElementById("cc");
  var ev = getEv();
  if(!ev){
    cc.innerHTML = `<div class="emp"><div style="font-size:40px;margin-bottom:8px">🍗</div><div>イベントがありません</div><div style="font-size:12px;margin-top:8px">「イベント」タブから追加してください</div></div>`;
    document.getElementById("acb").style.display = "none";
    return;
  }
  document.getElementById("acb").style.display = SORT ? "none" : "block";
  cc.innerHTML = ev.categories.map(function(cat, ci){
    var chk = cat.items.filter(function(it){ return it.checked; }).length;
    var sub = SORT ? cat.items.length + " アイテム" : chk + "/" + cat.items.length + " 完了";
    var catPending = PDC === cat.id;
    var sortButtons = "";
    if(SORT){
      sortButtons = `
        <button class="sa" ${ci === 0 ? "disabled" : ""} onclick="moveCat('${cat.id}',-1)">▲</button>
        <button class="sa" ${ci === ev.categories.length - 1 ? "disabled" : ""} onclick="moveCat('${cat.id}',1)">▼</button>`;
    }
    var rows = SORT
      ? `<div style="padding:8px 14px;font-size:12px;opacity:.5">${cat.items.length} アイテム</div>`
      : cat.items.map(function(it){
        var itemKey = cat.id + "|" + it.id;
        var itemPending = PDI === itemKey;
        return `<div class="ir${it.checked ? " ck" : ""}" id="r${esc(it.id)}">
          <div class="bx${it.checked ? " ck" : ""}" onclick="togItem('${cat.id}','${it.id}')">${it.checked ? "✓" : ""}</div>
          <div class="nm${it.checked ? " ck" : ""}" onclick="openMo('${cat.id}','${it.id}')">${esc(it.name)}</div>
          <div class="qc">
            <button class="qb" type="button" onclick="chQty('${cat.id}','${it.id}',-1)">−</button>
            <span class="qn" id="q${esc(it.id)}">${it.qty}</span>
            <button class="qb" type="button" onclick="chQty('${cat.id}','${it.id}',1)">+</button>
          </div>
          ${itemPending
            ? `<div class="dc"><button class="dr" type="button" onclick="runDelItem('${cat.id}','${it.id}')">実行</button><button class="dk" type="button" onclick="cancelDel()">戻る</button></div>`
            : `<button class="db" type="button" onclick="delItem('${cat.id}','${it.id}')">×</button>`}
        </div>`;
      }).join("");
    if(!SORT){
      if(ACID === cat.id){
        rows += `<div class="ar">
          <input class="ti" style="flex:1;min-width:80px" id="ni${cat.id}" placeholder="アイテム名">
          <input class="qi" id="nq${cat.id}" type="number" min="0" value="1">
          <button class="ok" type="button" onclick="doAddItem('${cat.id}')">追加</button>
          <button class="ng" type="button" onclick="cancelAI()">✕</button>
        </div>`;
      } else {
        rows += `<button class="aib" type="button" onclick="startAI('${cat.id}')">＋ アイテムを追加</button>`;
      }
    }
    return `<div class="cb${SORT ? " sm" : ""}" id="ct${esc(cat.id)}">
      <div class="ch">
        <div><div class="cn">${esc(cat.name)}</div><div class="cs">${sub}</div></div>
        <div class="ca">${sortButtons}${catPending
          ? `<div class="dc"><button class="dr" type="button" onclick="runDelCat('${cat.id}')">実行</button><button class="dk" type="button" onclick="cancelDel()">戻る</button></div>`
          : `<button class="ib" type="button" onclick="delCat('${cat.id}')">🗑</button>`}</div>
      </div>${rows}</div>`;
  }).join("");
  if(ACID){
    var el = document.getElementById("ni" + ACID);
    if(el) el.focus();
  }
}

function rEvList(){
  var el = document.getElementById("el");
  el.innerHTML = EVS.map(function(e){
    var tot = 0, chk = 0;
    e.categories.forEach(function(c){
      c.items.forEach(function(it){ tot++; if(it.checked) chk++; });
    });
    var act = e.id === AID;
    return `<div class="ec${act ? " on" : ""}">
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:15px;word-break:break-word">${esc(e.name)}</div>
        ${e.date ? `<div style="font-size:11px;opacity:.6;margin-top:2px">${esc(e.date)}</div>` : ""}
        <div style="font-size:11px;color:#f39c12;margin-top:4px">${chk}/${tot} チェック済み</div>
      </div>
      <button class="esb${act ? " on" : ""}" type="button" onclick="selEv('${e.id}')">${act ? "✓ 選択中" : "選択"}</button>
      ${EVS.length > 1 ? `<button class="ib" type="button" onclick="delEv('${e.id}')">🗑</button>` : ""}
    </div>`;
  }).join("");
}

function rCopySel(){
  var sel = document.getElementById("cfs");
  var cur = sel.value;
  sel.innerHTML = `<option value="">― 空のリストで始める ―</option>` + EVS.map(function(e){
    return `<option value="${esc(e.id)}"${e.id === cur ? " selected" : ""}>${esc(e.name)}${e.date ? "  " + esc(e.date) : ""}</option>`;
  }).join("");
}

function sw(v){
  document.getElementById("vc").style.display = v === "c" ? "block" : "none";
  document.getElementById("ve").style.display = v === "e" ? "block" : "none";
  document.getElementById("n0").className = "nb" + (v === "c" ? " on" : "");
  document.getElementById("n1").className = "nb" + (v === "e" ? " on" : "");
  if(v === "c"){ SORT = false; updSMB(); rCats(); }
  if(v === "e"){ rCopySel(); rEvList(); }
}
function onSel(id){ AID = id; render(); }
function selEv(id){ AID = id; sw("c"); render(); }

function togItem(cid, iid){
  var it = findItem(cid, iid);
  if(!it) return;
  it.checked = !it.checked;
  save();
  var fl = document.getElementById("fl");
  fl.style.animation = "fp 0.6s ease";
  setTimeout(function(){ fl.style.animation = ""; }, 600);
  rCats();
  rHead();
}
function findItem(cid, iid){
  var ev = getEv();
  if(!ev) return null;
  var cat = ev.categories.find(function(c){ return c.id === cid; });
  if(!cat) return null;
  return cat.items.find(function(it){ return it.id === iid; }) || null;
}
function chQty(cid, iid, d){
  var it = findItem(cid, iid);
  if(!it) return;
  it.qty = Math.max(0, Number(it.qty || 0) + d);
  save();
  var el = document.getElementById("q" + iid);
  if(el) el.textContent = it.qty;
}
function delItem(cid, iid){
  var key = cid + "|" + iid;
  PDI = key;
  PDC = null;
  rCats();
}
function runDelItem(cid, iid){
  if(PDI !== cid + "|" + iid) return;
  var ev = getEv();
  if(!ev) return;
  var cat = ev.categories.find(function(c){ return c.id === cid; });
  if(!cat) return;
  cat.items = cat.items.filter(function(it){ return it.id !== iid; });
  PDI = null;
  save(); rCats(); rHead(); rEvList();
}
function cancelDel(){
  PDC = null;
  PDI = null;
  rCats();
}

function startAI(cid){ ACID = cid; rCats(); }
function cancelAI(){ ACID = null; rCats(); }
function doAddItem(cid){
  var ne = document.getElementById("ni" + cid);
  var qe = document.getElementById("nq" + cid);
  var name = trimText(ne && ne.value);
  if(!name) return;
  var qty = Math.max(0, parseInt(qe && qe.value, 10));
  if(isNaN(qty)) qty = 1;
  var ev = getEv();
  var cat = ev && ev.categories.find(function(c){ return c.id === cid; });
  if(!cat) return;
  cat.items.push({id:gid(), name:name, qty:qty, checked:false});
  save();
  ACID = null;
  PDI = null;
  rCats(); rHead(); rEvList();
}

function showAC(){
  document.getElementById("acf").style.display = "block";
  document.getElementById("acb").style.display = "none";
  document.getElementById("ncn").focus();
}
function hideAC(){
  document.getElementById("acf").style.display = "none";
  document.getElementById("acb").style.display = "block";
}
function doAddCat(){
  var name = trimText(document.getElementById("ncn").value);
  if(!name) return;
  var ev = getEv();
  if(!ev) return;
  ev.categories.push({id:gid(), name:name, items:[]});
  save();
  document.getElementById("ncn").value = "";
  hideAC();
  rCats(); rSel(); rEvList();
}
function delCat(cid){
  PDC = cid;
  PDI = null;
  rCats();
}
function runDelCat(cid){
  if(PDC !== cid) return;
  var ev = getEv();
  if(!ev) return;
  ev.categories = ev.categories.filter(function(c){ return c.id !== cid; });
  if(ACID === cid) ACID = null;
  PDC = null;
  PDI = null;
  save(); rCats(); rSel(); rHead(); rEvList();
}
function moveCat(cid, d){
  var ev = getEv();
  if(!ev) return;
  var idx = ev.categories.findIndex(function(c){ return c.id === cid; });
  var ni = idx + d;
  if(idx < 0 || ni < 0 || ni >= ev.categories.length) return;
  var tmp = ev.categories[idx];
  ev.categories[idx] = ev.categories[ni];
  ev.categories[ni] = tmp;
  save(); rCats();
}
function togSort(){ SORT = !SORT; updSMB(); rCats(); }
function updSMB(){
  var b = document.getElementById("smb");
  if(!b) return;
  b.textContent = SORT ? "✓ 並び替え完了" : "⇅ カテゴリ並び替え";
  b.className = "smb" + (SORT ? " on" : "");
}

function doReset(){
  var ev = getEv();
  if(!ev) return;
  ev.categories.forEach(function(c){ c.items.forEach(function(it){ it.checked = false; }); });
  save(); rCats(); rHead(); rEvList();
}
function hardReset(){
  try {
    localStorage.removeItem("gc3");
    localStorage.removeItem("gotchi-v2");
    localStorage.removeItem("gotchi-events");
  } catch(e){}
  EVS = JSON.parse(JSON.stringify(DEF));
  AID = EVS[0].id;
  SORT = false;
  ACID = null;
  save();
  render();
}

function doAddEv(){
  var name = trimText(document.getElementById("nen").value);
  if(!name) return;
  var date = document.getElementById("ned").value;
  var copyId = document.getElementById("cfs").value;
  var cats = [];
  if(copyId){
    var src = EVS.find(function(e){ return e.id === copyId; });
    if(src){
      cats = src.categories.map(function(sc){
        return {
          id: gid(),
          name: sc.name,
          items: sc.items.map(function(si){ return {id:gid(), name:si.name, qty:si.qty, checked:false}; })
        };
      });
    }
  }
  var ne = {id:gid(), name:name, date:date, categories:cats};
  EVS.push(ne);
  AID = ne.id;
  save();
  document.getElementById("nen").value = "";
  document.getElementById("ned").value = "";
  document.getElementById("cfs").value = "";
  document.getElementById("ch").style.display = "none";
  document.getElementById("aeb").textContent = "イベントを追加";
  sw("c");
  render();
}
function delEv(id){
  EVS = EVS.filter(function(e){ return e.id !== id; });
  AID = AID === id ? (EVS.length ? EVS[0].id : null) : AID;
  save(); render();
}
function onCFC(){
  var v = document.getElementById("cfs").value;
  document.getElementById("ch").style.display = v ? "block" : "none";
  document.getElementById("aeb").textContent = v ? "📋 流用してイベントを追加" : "イベントを追加";
}

function openMo(cid, iid){
  var it = findItem(cid, iid);
  if(!it) return;
  ECID = cid;
  EIID = iid;
  document.getElementById("ein").value = it.name;
  document.getElementById("eiq").value = it.qty;
  document.getElementById("mo").className = "show";
  setTimeout(function(){ document.getElementById("ein").focus(); }, 100);
}
function closeMo(){ document.getElementById("mo").className = ""; ECID = null; EIID = null; }
function saveMo(){
  var it = findItem(ECID, EIID);
  if(!it) return;
  var n = trimText(document.getElementById("ein").value);
  var q = parseInt(document.getElementById("eiq").value, 10);
  if(n) it.name = n;
  it.qty = isNaN(q) ? 0 : Math.max(0, q);
  save();
  closeMo();
  rCats(); rHead(); rEvList();
}

load();
render();
</script>
</body>
</html>
